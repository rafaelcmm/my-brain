name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  required-gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Enable Corepack and pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.15.4 --activate
      - name: Install root deps
        run: pnpm install --frozen-lockfile
      - name: Root lint
        run: pnpm lint
      - name: Root tests
        run: pnpm test
      - name: Prettier check
        run: pnpm exec prettier --check .

  lint-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/orchestrator
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable Corepack and pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.15.4 --activate

      - uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-${{ runner.os }}-${{ hashFiles('src/orchestrator/pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ludeeus/action-shellcheck@master
        with:
          scandir: ./src/scripts

  caddyfile-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build gateway image (cache)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/gateway/Dockerfile
          load: true
          push: false
          tags: my-brain/gateway:local
          cache-from: type=gha,scope=gateway
          cache-to: type=gha,mode=max,scope=gateway
      - name: Validate Caddyfile
        run: |
          # Validate with project gateway build because Caddyfile uses custom modules.
          docker run --rm -v "$PWD/src/gateway:/etc/caddy" my-brain/gateway:local caddy validate --config /etc/caddy/Caddyfile

  docker-build:
    runs-on: ubuntu-latest
    needs: [required-gates, lint-and-test]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build orchestrator image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/orchestrator/Dockerfile
          push: false
          tags: my-brain/orchestrator:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  compose-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate docker-compose.yml
        run: |
          cp .env.example .env
          sed -i 's|MYBRAIN_DB_PASSWORD=.*|MYBRAIN_DB_PASSWORD=ci-test-password|' .env
          mkdir -p .secrets
          printf 'my-brain-ci-token' > .secrets/auth-token
          printf 'unused-placeholder' > .secrets/auth-token.previous
          chmod 700 .secrets
          chmod 600 .secrets/auth-token .secrets/auth-token.previous
          docker compose config > /dev/null

  prettier-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Enable Corepack and pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.15.4 --activate
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec prettier --check .

  integration-smoke:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs: [required-gates, compose-validate, caddyfile-validate, shellcheck]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Prepare env and secrets
        run: |
          cp .env.example .env
          sed -i 's|MYBRAIN_DB_PASSWORD=.*|MYBRAIN_DB_PASSWORD=ci-test-password|' .env
          mkdir -p .secrets
          printf 'my-brain-ci-token-abcdefghijklmnopqrstuvwxyz-ABCDEFGHIJKLMNOPQRSTUVWXYZ-1234' > .secrets/auth-token
          printf 'unused-placeholder' > .secrets/auth-token.previous
          chmod 700 .secrets
          chmod 600 .secrets/auth-token .secrets/auth-token.previous
      - name: Build orchestrator image (cache)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/orchestrator/Dockerfile
          load: true
          push: false
          tags: my-brain/orchestrator:local
          cache-from: type=gha,scope=orchestrator
          cache-to: type=gha,mode=max,scope=orchestrator
      - name: Build MCP bridge image (cache)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/mcp-bridge/Dockerfile
          load: true
          push: false
          tags: my-brain/mcp-bridge:local
          cache-from: type=gha,scope=mcp-bridge
          cache-to: type=gha,mode=max,scope=mcp-bridge
      - name: Build gateway image (cache)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/gateway/Dockerfile
          load: true
          push: false
          tags: my-brain/gateway:local
          cache-from: type=gha,scope=gateway
          cache-to: type=gha,mode=max,scope=gateway
      - name: Build web image (cache)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/web/Dockerfile
          load: true
          push: false
          tags: my-brain/web:local
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web
      - name: Build and start stack
        # Manual deep smoke: all app images are prebuilt and loaded locally.
        # CI runners may not have NVIDIA runtime; use base compose only (CPU-safe).
        run: docker compose -f docker-compose.yml up -d --no-build
      - name: Smoke test
        run: ./src/scripts/smoke-test.sh
      - name: Validate tool ids
        run: ./src/scripts/validate-tool-ids.sh
      - name: Dump logs on failure
        if: failure()
        run: docker compose logs --no-color
      - name: Tear down stack
        if: always()
        run: docker compose down -v
