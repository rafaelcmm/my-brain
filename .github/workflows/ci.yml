name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/orchestrator
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable Corepack and pnpm
        run: |
          npm install -g corepack@0.31.0
          corepack enable
          corepack prepare pnpm@9.15.4 --activate

      - uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-${{ runner.os }}-${{ hashFiles('src/orchestrator/pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ludeeus/action-shellcheck@master
        with:
          scandir: ./src/scripts

  caddyfile-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate Caddyfile
        run: |
          docker run --rm -v "$PWD/src/gateway:/etc/caddy" caddy:2-alpine caddy validate --config /etc/caddy/Caddyfile

  docker-build:
    runs-on: ubuntu-latest
    needs: [lint-and-test]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build orchestrator image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/orchestrator/Dockerfile
          push: false
          tags: my-brain/orchestrator:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  compose-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate docker-compose.yml
        run: |
          cp .env.example .env
          sed -i 's|MYBRAIN_DB_PASSWORD=.*|MYBRAIN_DB_PASSWORD=ci-test-password|' .env
          mkdir -p .secrets
          printf 'my-brain-ci-token' > .secrets/auth-token
          printf 'unused-placeholder' > .secrets/auth-token.previous
          chmod 700 .secrets
          chmod 600 .secrets/auth-token .secrets/auth-token.previous
          docker compose config > /dev/null

  prettier-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npx prettier --check .
