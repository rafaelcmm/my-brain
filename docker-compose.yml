services:
  brain-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    image: my-brain-mcp:latest
    environment:
      MCP_SERVER_NAME: ${MCP_SERVER_NAME:-my-brain}
      MCP_SERVER_VERSION: ${MCP_SERVER_VERSION:-0.1.0}
      MCP_TRANSPORT: ${MCP_TRANSPORT:-http}
      MCP_HTTP_HOST: ${MCP_HTTP_HOST:-0.0.0.0}
      MCP_HTTP_PORT: ${MCP_HTTP_PORT:-3737}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-minilm}
      EMBEDDING_MODEL_ID: ${EMBEDDING_MODEL_ID:-sentence-transformers/all-MiniLM-L6-v2}
      EMBEDDING_DIM: ${EMBEDDING_DIM:-384}
      EMBEDDING_QUANTIZED: ${EMBEDDING_QUANTIZED:-false}
      MODEL_CACHE_DIR: ${MODEL_CACHE_DIR:-/models}
      SONA_MICRO_LORA_RANK: ${SONA_MICRO_LORA_RANK:-2}
      SONA_BASE_LORA_RANK: ${SONA_BASE_LORA_RANK:-16}
      SONA_MICRO_LORA_LR: ${SONA_MICRO_LORA_LR:-0.002}
      SONA_QUALITY_THRESHOLD: ${SONA_QUALITY_THRESHOLD:-0.3}
      SONA_PATTERN_CLUSTERS: ${SONA_PATTERN_CLUSTERS:-100}
      SONA_EWC_LAMBDA: ${SONA_EWC_LAMBDA:-2000}
      RUVECTOR_DB_PATH: ${RUVECTOR_DB_PATH:-/data/ruvector.db}
    ports:
      - '${MCP_HTTP_PORT:-3737}:${MCP_HTTP_PORT:-3737}'
    volumes:
      - brain_data:/data
      - brain_models:/models
    restart: unless-stopped
    init: true
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:' + (process.env.MCP_HTTP_PORT || '3737') + '/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 45s

volumes:
  brain_data:
  brain_models:
