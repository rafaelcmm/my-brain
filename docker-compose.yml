name: ${MYBRAIN_PROJECT_NAME:-my-brain}

networks:
  default:
    name: ${MYBRAIN_NETWORK_NAME:-my-brain-net}

volumes:
  db-data:
    name: ${MYBRAIN_DB_VOLUME:-my-brain-db-data}
  models:
    name: ${MYBRAIN_ORCHESTRATOR_VOLUME_MODELS:-my-brain-models}
  state:
    name: ${MYBRAIN_ORCHESTRATOR_VOLUME_STATE:-my-brain-state}
  ollama:
    name: ${MYBRAIN_LLM_VOLUME:-my-brain-ollama}
  caddy-data:
    name: my-brain-caddy-data
  caddy-config:
    name: my-brain-caddy-config

secrets:
  auth-token:
    file: ./.secrets/auth-token

services:
  my-brain-db:
    image: ${MYBRAIN_DB_IMAGE:-ruvnet/ruvector-postgres:latest}
    container_name: my-brain-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${MYBRAIN_DB_USER:-mybrain}
      POSTGRES_PASSWORD: ${MYBRAIN_DB_PASSWORD:?ERROR set MYBRAIN_DB_PASSWORD in .env}
      POSTGRES_DB: ${MYBRAIN_DB_NAME:-mybrain_db}
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./src/db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${MYBRAIN_DB_USER:-mybrain} -d ${MYBRAIN_DB_NAME:-mybrain_db}",
        ]
      interval: 5s
      timeout: 5s
      retries: 12

  my-brain-llm:
    image: ${MYBRAIN_LLM_IMAGE:-ollama/ollama:latest}
    container_name: my-brain-llm
    restart: unless-stopped
    environment:
      OLLAMA_HOST: 0.0.0.0
    volumes:
      - ollama:/root/.ollama
    expose:
      - "11434"
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 12

  my-brain-llm-init:
    image: ${MYBRAIN_LLM_IMAGE:-ollama/ollama:latest}
    container_name: my-brain-llm-init
    depends_on:
      my-brain-llm:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://my-brain-llm:11434
      MYBRAIN_LLM_MODEL: ${MYBRAIN_LLM_MODEL:-qwen3.5:0.8b}
      MYBRAIN_EMBEDDING_MODEL: ${MYBRAIN_EMBEDDING_MODEL:-qwen3-embedding:0.6b}
    entrypoint: ["/bin/sh", "-ec"]
    command:
      - |
        ollama pull ${MYBRAIN_LLM_MODEL:-qwen3.5:0.8b}
        ollama pull ${MYBRAIN_EMBEDDING_MODEL:-qwen3-embedding:0.6b}
    restart: "no"

  my-brain-orchestrator:
    image: ${MYBRAIN_ORCHESTRATOR_IMAGE_TAG:-my-brain/orchestrator:local}
    build:
      context: .
      dockerfile: src/orchestrator/Dockerfile
    container_name: my-brain-orchestrator
    restart: unless-stopped
    depends_on:
      my-brain-db:
        condition: service_healthy
      my-brain-llm:
        condition: service_healthy
      my-brain-llm-init:
        condition: service_completed_successfully
    environment:
      MYBRAIN_LOG_LEVEL: ${MYBRAIN_LOG_LEVEL:-info}
      MYBRAIN_DB_URL: postgres://${MYBRAIN_DB_USER:-mybrain}:${MYBRAIN_DB_PASSWORD}@my-brain-db:5432/${MYBRAIN_DB_NAME:-mybrain_db}
      MYBRAIN_LLM_URL: http://my-brain-llm:11434
      MYBRAIN_LLM_MODEL: ${MYBRAIN_LLM_MODEL:-qwen3.5:0.8b}
      MYBRAIN_RECALL_PROCESS_TIMEOUT_MS: ${MYBRAIN_RECALL_PROCESS_TIMEOUT_MS:-180000}
      MYBRAIN_EMBEDDING_MODEL: ${MYBRAIN_EMBEDDING_MODEL:-qwen3-embedding:0.6b}
      MYBRAIN_AUTH_TOKEN_FILE: /run/secrets/auth-token
      MYBRAIN_MIN_TOKEN_LENGTH: ${MYBRAIN_MIN_TOKEN_LENGTH:-73}
      MYBRAIN_RATE_LIMIT_PER_MIN: ${MYBRAIN_RATE_LIMIT_PER_MIN:-60}
      MYBRAIN_MAX_REQUEST_BODY_BYTES: ${MYBRAIN_MAX_REQUEST_BODY_BYTES:-1048576}
      MYBRAIN_INTERNAL_API_KEY: ${MYBRAIN_INTERNAL_API_KEY:-my-brain-internal-local-key}
      # Allow gateway-only auth when the orchestrator user cannot read the token secret.
      # Must be set explicitly; defaults to false (fail-closed).
      MYBRAIN_ALLOW_GATEWAY_ONLY_AUTH: ${MYBRAIN_ALLOW_GATEWAY_ONLY_AUTH:-false}
      RUVECTOR_HOST: 0.0.0.0
      RUVECTOR_PORT: "8080"
      RUVECTOR_CORS_ORIGINS: ${MYBRAIN_CORS_ORIGINS:-http://localhost,http://127.0.0.1}
      RUVECTOR_ENABLE_COMPRESSION: "true"
      RUVLLM_SONA_ENABLED: ${MYBRAIN_SONA_ENABLED:-true}
      MYBRAIN_EMBEDDING_DIM: ${MYBRAIN_EMBEDDING_DIM:-384}
    volumes:
      - models:/app/models
      - state:/app/.mybrain
    secrets:
      - source: auth-token
        target: auth-token
        mode: 0444
    expose:
      - "8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 90s

  my-brain-mcp:
    image: my-brain/mcp-bridge:local
    build:
      context: .
      dockerfile: src/mcp-bridge/Dockerfile
    container_name: my-brain-mcp
    restart: unless-stopped
    depends_on:
      my-brain-orchestrator:
        condition: service_healthy
    environment:
      MYBRAIN_REST_URL: http://my-brain-orchestrator:8080
      MYBRAIN_DB_URL: postgres://${MYBRAIN_DB_USER:-mybrain}:${MYBRAIN_DB_PASSWORD}@my-brain-db:5432/${MYBRAIN_DB_NAME:-mybrain_db}
      MYBRAIN_ALLOWED_ORIGINS: ${MYBRAIN_ALLOWED_MCP_ORIGINS:-http://localhost,http://127.0.0.1}
      MYBRAIN_INTERNAL_API_KEY: ${MYBRAIN_INTERNAL_API_KEY:-my-brain-internal-local-key}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'code=$$(curl --max-time 3 -s -o /dev/null -w ''%{http_code}'' -X POST http://localhost:3333/mcp -H ''content-type: application/json'' -H ''accept: application/json, text/event-stream'' -H ''mcp-protocol-version: 2024-11-05'' --data ''{"jsonrpc":"2.0","id":"health","method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"healthcheck","version":"1.0.0"}}}'' || true); [ "$$code" = "200" ]',
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    expose:
      - "3333"
      - "9090"
    ports:
      - "${MYBRAIN_BIND_HOST:-127.0.0.1}:${MYBRAIN_PROMETHEUS_PORT:-9090}:9090"

  my-brain-web:
    image: my-brain/web:local
    build:
      context: .
      dockerfile: src/web/Dockerfile
    container_name: my-brain-web
    restart: unless-stopped
    depends_on:
      my-brain-orchestrator:
        condition: service_healthy
    environment:
      MYBRAIN_WEB_SESSION_SECRET: ${MYBRAIN_WEB_SESSION_SECRET:?ERROR set MYBRAIN_WEB_SESSION_SECRET in .env}
      MYBRAIN_WEB_ORCHESTRATOR_URL: http://my-brain-orchestrator:8080
      MYBRAIN_INTERNAL_API_KEY: ${MYBRAIN_INTERNAL_API_KEY:-my-brain-internal-local-key}
      MYBRAIN_WEB_PUBLIC_BASE_URL: ${MYBRAIN_WEB_PUBLIC_BASE_URL:-http://localhost:${MYBRAIN_WEB_PORT:-3000}}
      MYBRAIN_WEB_LOG_LEVEL: ${MYBRAIN_WEB_LOG_LEVEL:-info}
      MYBRAIN_WEB_RATE_LIMIT_LOGIN: ${MYBRAIN_WEB_RATE_LIMIT_LOGIN:-5}
      NODE_ENV: production
    expose:
      - "3000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "fetch(''http://localhost:3000/api/health'').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"',
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  my-brain-gateway:
    image: my-brain/gateway:local
    build:
      context: .
      dockerfile: src/gateway/Dockerfile
    container_name: my-brain-gateway
    restart: unless-stopped
    depends_on:
      my-brain-mcp:
        condition: service_healthy
      my-brain-orchestrator:
        condition: service_healthy
      my-brain-web:
        condition: service_healthy
    environment:
      MYBRAIN_CORS_ORIGINS: ${MYBRAIN_CORS_ORIGINS:-http://localhost,http://127.0.0.1}
      MYBRAIN_INTERNAL_API_KEY: ${MYBRAIN_INTERNAL_API_KEY:-my-brain-internal-local-key}
    volumes:
      - ./src/gateway/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./.secrets:/run/secrets:ro
      - caddy-data:/data
      - caddy-config:/config
    ports:
      - "${MYBRAIN_BIND_HOST:-127.0.0.1}:${MYBRAIN_MCP_PORT:-3333}:3333"
      - "${MYBRAIN_BIND_HOST:-127.0.0.1}:${MYBRAIN_REST_PORT:-8080}:8080"
      - "${MYBRAIN_BIND_HOST:-127.0.0.1}:${MYBRAIN_WEB_PORT:-3000}:3000"
